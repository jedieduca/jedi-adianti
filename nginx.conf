server {
    listen 80;
    server_name admin.jedieduca.com.br;

    # 🔹 OTIMIZAÇÃO 1: Habilitar compactação Gzip (Diminui o tamanho de HTML, CSS e JS trafegados)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 🔹 OTIMIZAÇÃO 2: Ajustar Buffers do Proxy (Evita gargalo ao passar dados pro PHP/Python)
    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    root /var/www/html;
    index index.php index.html;

    # Escopo da aplicação ADM
    location /adm {
        try_files $uri $uri/ /adm/index.php?$query_string;
    }

    # Escopo da aplicação MAD
    location /mad {
        try_files $uri $uri/ /mad/index.php?$query_string;
    }

    # Processamento de arquivos PHP
    location ~ \.php(/.*)?$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_pass php_cadjedi:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
    }

# =========================================================================
    # PROXY REVERSO PARA A API PYTHON (FastAPI)
    # =========================================================================
    # Mantemos sem a barra no final para o /api/docs herdar corretamente o root_path
    location /api/ {
        proxy_pass http://python_service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }

    # =========================================================================
    # 🔹 CORRIGIDO COM PRIORIDADE MÁXIMA: ROTA ESTÁTICA ORIGINAL DO PYTHON
    # =========================================================================
    # O '^~' impede que as regras de cache de imagens lá de baixo roubem essa rota
    location ^~ /static/ {
        proxy_pass http://python_service:8001/api/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mantém o cache ativo para performance
        expires 1d;
        access_log off;
    }
    
    # Bloqueia arquivos de configuração sensíveis do Adianti (.ini, .env)
    location ~* \.(env|git|ini|txt|htaccess)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}